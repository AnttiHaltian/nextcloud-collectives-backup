---
- name: Extract Nextcloud data
  hosts: eu_remote_docker
  gather_facts: true
  vars:
    nc_container: "master-nextcloud-1"
    db_container: "master-database-mysql-1"
    db_user: "nextcloud"
    db_password: "nextcloud"
    db_name: "nextcloud"
    backup_root: "{{ playbook_dir }}/backups"
    timestamp: "{{ ansible_date_time.date }}_{{ ansible_date_time.hour }}{{ ansible_date_time.minute }}"
    backup_path: "{{ backup_root }}/{{ timestamp }}"

  tasks:
    - name: Create local backup dirs
      delegate_to: localhost
      file:
        path: "{{ item }}"
        state: directory
      loop:
        - "{{ backup_path }}/db"
        - "{{ backup_path }}/s3_dump"

    - name: Maintenance on prod
      shell: "docker exec -u 33 {{ nc_container }} php occ maintenance:mode --on"

    - name: Dump database to remote host filesystem
      shell: "docker exec {{ db_container }} mariadb-dump -u {{ db_user }} -p{{ db_password }} {{ db_name }} > /tmp/nextcloud_db_dump.sql"

    - name: Fetch SQL dump to control node
      fetch:
        src: /tmp/nextcloud_db_dump.sql
        dest: "{{ backup_path }}/db/dump.sql"
        flat: yes

    - name: Clean up remote dump file
      file:
        path: /tmp/nextcloud_db_dump.sql
        state: absent

    - name: Copy config.php to remote temp dir
      shell: "docker cp {{ nc_container }}:/var/www/html/config/config.php /tmp/config.php"

    - name: Fetch config.php
      fetch:
        src: /tmp/config.php
        dest: "{{ backup_path }}/config.php"
        flat: yes

    - name: Clean up remote temp file
      file:
        path: /tmp/config.php
        state: absent

    - name: Copy remote S3 to local
      delegate_to: localhost
      command: "rclone copy remote_src:nextcloud-bucket {{ backup_path }}/s3_dump/ -P"
      environment:
        RCLONE_CONFIG_REMOTE_SRC_TYPE: s3
        RCLONE_CONFIG_REMOTE_SRC_PROVIDER: Minio
        RCLONE_CONFIG_REMOTE_SRC_ENDPOINT: "http://{{ ansible_host }}:{{ minio_port }}"
        RCLONE_CONFIG_REMOTE_SRC_ACCESS_KEY_ID: "{{ minio_user }}"
        RCLONE_CONFIG_REMOTE_SRC_SECRET_ACCESS_KEY: "{{ minio_pass }}"
        RCLONE_CONFIG_REMOTE_SRC_REGION: "{{ s3_region }}"
      
    - name: Backup complete
      debug:
        msg: "Backup path: {{ backup_path }}"